<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login — Sejarah Penebusan ASP</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#1DB89A;--teal-dark:#0F8870;--gray:#4D4D4D;--muted:#888;--border:#E8E8E8;--danger:#E24B4A;--bg:#F0FAF7}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg)}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:400px;background:white;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(29,184,154,0.12)}
.hero{background:linear-gradient(145deg,var(--teal),var(--teal-dark));padding:32px 24px;text-align:center}
.logo{width:60px;height:60px;background:rgba(255,255,255,0.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.logo svg{width:38px;height:38px}
.app-name{font-size:16px;font-weight:900;color:white;letter-spacing:1px}
.tagline{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;margin-top:3px}
.badge{margin-top:12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 14px;display:inline-block;font-size:11px;color:white;font-weight:700}
.body{padding:24px}
.alert{display:none;background:#FCE8E8;border:1px solid #F5C6C6;border-radius:10px;padding:10px 14px;font-size:12px;color:#A32D2D;font-weight:600;margin-bottom:14px}
.alert.show{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:5px}
.input-wrap{position:relative}
.input-wrap input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Nunito',sans-serif;color:var(--gray);outline:none;background:#FAFAFA}
.input-wrap input:focus{border-color:var(--teal);background:white}
.err-msg{display:none;font-size:11px;color:var(--danger);font-weight:600;margin-top:4px}
.err-msg.show{display:block}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center}
.btn{width:100%;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:white;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:14px}
.btn:disabled{opacity:0.7;cursor:not-allowed}
.forgot{text-align:center;font-size:12px;color:var(--muted)}
.forgot a{color:var(--teal);font-weight:700;text-decoration:none}
.spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
.btn.loading .btn-text{display:none}
.btn.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
  <div class="hero">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none">
        <rect x="2" y="28" width="18" height="13" rx="2.5" fill="white"/>
        <rect x="28" y="28" width="18" height="13" rx="2.5" fill="white"/>
        <rect x="19" y="26" width="10" height="15" rx="1" fill="rgba(255,255,255,0.4)"/>
        <rect x="21" y="16" width="6" height="12" rx="2" fill="rgba(255,255,255,0.85)"/>
        <ellipse cx="15" cy="16" rx="2.5" ry="2.5" fill="rgba(255,255,255,0.95)"/>
        <ellipse cx="24" cy="10" rx="2.5" ry="2.5" fill="rgba(255,255,255,0.95)"/>
        <ellipse cx="33" cy="16" rx="2.5" ry="2.5" fill="rgba(255,255,255,0.95)"/>
        <ellipse cx="19" cy="8" rx="1.8" ry="1.8" fill="rgba(255,255,255,0.7)"/>
        <ellipse cx="29" cy="8" rx="1.8" ry="1.8" fill="rgba(255,255,255,0.7)"/>
      </svg>
    </div>
    <div class="app-name">SEJARAH PENEBUSAN</div>
    <div class="tagline">BENIH KEBENARAN BUAH KEHIDUPAN</div>
    <div class="badge">Program ASP — Hamba Tuhan</div>
  </div>
  <div class="body">
    <div class="alert" id="alert">Username atau password salah.</div>
    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
      </div>
      <div class="err-msg" id="usernameErr">Username tidak boleh kosong</div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Masukkan password" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')">
        <button class="toggle-pw" type="button" onclick="togglePw()">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="err-msg" id="passwordErr">Password tidak boleh kosong</div>
    </div>
    <button class="btn" id="btn" onclick="login()">
      <span class="btn-text">Masuk</span>
      <div class="spinner"></div>
    </button>
    <div class="forgot">Lupa password? <a href="#">Hubungi admin</a></div>
  </div>
</div>
</div>
<script>
const SB_URL = 'SUPABASE_URL_HERE';
const SB_KEY = 'SUPABASE_ANON_KEY_HERE';

async function rpc(fn, body) {
  const r = await fetch(`${SB_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  return {ok:r.ok, data:await r.json()};
}

window.addEventListener('DOMContentLoaded',()=>{
  const u=getUser(); if(u) redirect(u.role);
});

function getUser(){try{return JSON.parse(localStorage.getItem('asp_user'));}catch{return null;}}
function setUser(u){localStorage.setItem('asp_user',JSON.stringify(u));}
function redirect(role){window.location.href=role==='admin'?'admin.html':'peserta.html';}

function togglePw(){
  const i=document.getElementById('password');
  i.type=i.type==='password'?'text':'password';
}

async function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  let ok=true;
  document.getElementById('alert').classList.remove('show');
  document.getElementById('usernameErr').classList.remove('show');
  document.getElementById('passwordErr').classList.remove('show');
  if(!username){document.getElementById('usernameErr').classList.add('show');ok=false;}
  if(!password){document.getElementById('passwordErr').classList.add('show');ok=false;}
  if(!ok) return;

  const btn=document.getElementById('btn');
  btn.disabled=true; btn.classList.add('loading');

  try{
    const{ok:rok,data}=await rpc('rpc_login',{p_username:username,p_password:password});
    if(!rok||!Array.isArray(data)||data.length===0){
      document.getElementById('alert').classList.add('show'); return;
    }
    setUser(data[0]); redirect(data[0].role);
  }catch(e){
    document.getElementById('alert').textContent='Gagal terhubung. Coba lagi.';
    document.getElementById('alert').classList.add('show');
  }finally{
    btn.disabled=false; btn.classList.remove('loading');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
</script>
</body>
</html>
